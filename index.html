<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Management System</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #171b26;
    --surface2: #1e2436;
    --border: #2a3050;
    --accent: #3b82f6;
    --accent2: #10b981;
    --danger: #ef4444;
    --warn: #f59e0b;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .header-stats {
    display: flex;
    gap: 24px;
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
  }

  .stat-pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .dot.green { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .dot.red { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
  .dot.blue { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  /* Layout */
  .main {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 0;
    flex: 1;
    min-height: calc(100vh - 60px);
  }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .sidebar-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: var(--mono);
  }

  input[type="text"],
  input[type="number"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }

  input::placeholder { color: var(--text3); }

  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  button {
    padding: 11px 16px;
    border-radius: 6px;
    border: none;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-add {
    background: var(--accent);
    color: white;
  }
  .btn-add:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,0.35); }

  .btn-update {
    background: var(--accent2);
    color: white;
  }
  .btn-update:hover { background: #059669; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16,185,129,0.35); }

  .btn-delete {
    background: var(--danger);
    color: white;
    width: 100%;
  }
  .btn-delete:hover { background: #dc2626; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(239,68,68,0.35); }

  .btn-clear {
    background: transparent;
    color: var(--text3);
    border: 1px solid var(--border);
    width: 100%;
    font-size: 11px;
  }
  .btn-clear:hover { background: var(--surface2); color: var(--text2); }

  /* Content area */
  .content {
    display: flex;
    flex-direction: column;
  }

  /* Search bar */
  .search-bar {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
    background: var(--surface);
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 400px;
  }

  .search-wrap input {
    padding-left: 38px;
    background: var(--bg);
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
    pointer-events: none;
  }

  .btn-search {
    background: var(--accent);
    color: white;
    padding: 10px 20px;
  }
  .btn-search:hover { background: #2563eb; }

  .filter-tabs {
    display: flex;
    gap: 4px;
    margin-left: auto;
  }

  .tab {
    padding: 7px 14px;
    border-radius: 5px;
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text3);
    letter-spacing: 0.06em;
    transition: all 0.15s;
  }
  .tab.active { background: var(--surface2); border-color: var(--border); color: var(--text); }
  .tab:hover:not(.active) { color: var(--text2); }

  /* Table */
  .table-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--surface2);
  }

  thead th {
    padding: 14px 20px;
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover { color: var(--text2); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }

  tbody tr:hover { background: var(--surface2); }
  tbody tr.selected { background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.3); }

  tbody td {
    padding: 13px 20px;
    font-size: 13px;
    color: var(--text);
  }

  .td-id {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    width: 60px;
  }

  .td-name { font-weight: 500; }

  .td-qty {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
  }

  .td-price {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
  }

  .td-min {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-family: var(--mono);
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .badge.ok { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
  .badge.low { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
  .badge.out { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }

  /* Empty state */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 0;
    color: var(--text3);
    gap: 12px;
  }
  .empty-icon { font-size: 40px; opacity: 0.4; }
  .empty-text { font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; }

  /* Alert */
  .alert {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 14px 20px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 320px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .alert.show { transform: translateY(0); opacity: 1; }
  .alert.success { background: rgba(16,185,129,0.2); border: 1px solid rgba(16,185,129,0.4); color: #34d399; }
  .alert.error { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.4); color: #f87171; }
  .alert.warning { background: rgba(245,158,11,0.2); border: 1px solid rgba(245,158,11,0.4); color: #fbbf24; }

  /* Low stock warning banner */
  .warning-banner {
    background: rgba(245,158,11,0.1);
    border-bottom: 1px solid rgba(245,158,11,0.25);
    padding: 10px 28px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    font-family: var(--mono);
    color: #fbbf24;
  }
  .warning-banner.hidden { display: none; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📦</div>
    Inventory Management System
  </div>
  <div class="header-stats">
    <div class="stat-pill"><span class="dot blue"></span><span id="totalCount">0</span> mahsulot</div>
    <div class="stat-pill"><span class="dot green"></span><span id="okCount">0</span> yetarli</div>
    <div class="stat-pill"><span class="dot red"></span><span id="lowCount">0</span> kam qolgan</div>
  </div>
</header>

<div class="main">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-title">Mahsulot ma'lumotlari</div>

    <div class="form-group">
      <label>Mahsulot nomi</label>
      <input type="text" id="inpName" placeholder="Masalan: Coca-Cola 0.5L">
    </div>

    <div class="form-group">
      <label>Soni</label>
      <input type="number" id="inpQty" placeholder="0" min="0">
    </div>

    <div class="form-group">
      <label>Narxi (so'm)</label>
      <input type="number" id="inpPrice" placeholder="0.00" min="0" step="0.01">
    </div>

    <div class="form-group">
      <label>Minimal limit</label>
      <input type="number" id="inpMin" placeholder="5" min="0">
    </div>

    <div class="btn-group">
      <div class="btn-row">
        <button class="btn-add" onclick="addProduct()">＋ Qo'shish</button>
        <button class="btn-update" onclick="updateProduct()">✎ Yangilash</button>
      </div>
      <button class="btn-delete" onclick="deleteProduct()">✕ O'chirish</button>
      <button class="btn-clear" onclick="clearForm()">Tozalash</button>
    </div>
  </aside>

  <!-- Content -->
  <div class="content">
    <!-- Search bar -->
    <div class="search-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Mahsulot qidirish..." oninput="filterProducts()">
      </div>
      <div class="filter-tabs">
        <button class="tab active" onclick="setFilter('all', this)">Barchasi</button>
        <button class="tab" onclick="setFilter('ok', this)">Yetarli</button>
        <button class="tab" onclick="setFilter('low', this)">Kam qolgan</button>
      </div>
    </div>

    <!-- Warning banner -->
    <div class="warning-banner hidden" id="warningBanner">
      ⚠️ <span id="warningText"></span>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th onclick="sortBy('name')">NOMI ↕</th>
            <th onclick="sortBy('qty')">SONI ↕</th>
            <th onclick="sortBy('price')">NARXI ↕</th>
            <th>MINIMAL</th>
            <th>HOLAT</th>
          </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
      </table>
      <div class="empty hidden" id="emptyState">
        <div class="empty-icon">📭</div>
        <div class="empty-text">Mahsulot topilmadi</div>
      </div>
    </div>
  </div>
</div>

<div class="alert" id="alert"></div>

<script>
// ==================== DATA ====================
let products = JSON.parse(localStorage.getItem('inventory') || '[]');
let nextId = parseInt(localStorage.getItem('nextId') || '1');
let selectedId = null;
let currentFilter = 'all';
let sortKey = null;
let sortAsc = true;

// ==================== SAVE ====================
function save() {
  localStorage.setItem('inventory', JSON.stringify(products));
  localStorage.setItem('nextId', nextId);
}

// ==================== RENDER ====================
function render() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  
  let filtered = products.filter(p => {
    const matchSearch = p.name.toLowerCase().includes(search);
    const status = getStatus(p);
    if (currentFilter === 'ok') return matchSearch && status === 'ok';
    if (currentFilter === 'low') return matchSearch && (status === 'low' || status === 'out');
    return matchSearch;
  });

  if (sortKey) {
    filtered.sort((a, b) => {
      let va = a[sortKey], vb = b[sortKey];
      if (typeof va === 'string') va = va.toLowerCase();
      if (typeof vb === 'string') vb = vb.toLowerCase();
      return sortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });
  }

  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.classList.remove('hidden');
  } else {
    empty.classList.add('hidden');
    tbody.innerHTML = filtered.map(p => {
      const status = getStatus(p);
      const badge = status === 'ok'
        ? '<span class="badge ok">✓ Yetarli</span>'
        : status === 'low'
        ? '<span class="badge low">⚠ Kam qolgan</span>'
        : '<span class="badge out">✕ Tugagan</span>';
      const qtyColor = status === 'ok' ? '#34d399' : status === 'low' ? '#fbbf24' : '#f87171';
      return `<tr onclick="selectRow(${p.id})" ${p.id === selectedId ? 'class="selected"' : ''}>
        <td class="td-id">#${p.id}</td>
        <td class="td-name">${escHtml(p.name)}</td>
        <td class="td-qty" style="color:${qtyColor}">${p.qty}</td>
        <td class="td-price">${formatPrice(p.price)}</td>
        <td class="td-min">${p.min}</td>
        <td>${badge}</td>
      </tr>`;
    }).join('');
  }

  updateStats();
  updateWarning();
}

function getStatus(p) {
  if (p.qty === 0) return 'out';
  if (p.qty <= p.min) return 'low';
  return 'ok';
}

function formatPrice(n) {
  return Number(n).toLocaleString('uz-UZ') + ' so\'m';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateStats() {
  document.getElementById('totalCount').textContent = products.length;
  document.getElementById('okCount').textContent = products.filter(p => getStatus(p) === 'ok').length;
  document.getElementById('lowCount').textContent = products.filter(p => getStatus(p) !== 'ok').length;
}

function updateWarning() {
  const low = products.filter(p => getStatus(p) !== 'ok');
  const banner = document.getElementById('warningBanner');
  if (low.length > 0) {
    banner.classList.remove('hidden');
    document.getElementById('warningText').textContent =
      `${low.length} ta mahsulot kam/tugagan: ${low.map(p => p.name).join(', ')}`;
  } else {
    banner.classList.add('hidden');
  }
}

// ==================== ACTIONS ====================
function getFormData() {
  return {
    name: document.getElementById('inpName').value.trim(),
    qty: parseInt(document.getElementById('inpQty').value) || 0,
    price: parseFloat(document.getElementById('inpPrice').value) || 0,
    min: parseInt(document.getElementById('inpMin').value) || 0,
  };
}

function addProduct() {
  const d = getFormData();
  if (!d.name) return showAlert('Mahsulot nomini kiriting!', 'error');
  if (products.find(p => p.name.toLowerCase() === d.name.toLowerCase()))
    return showAlert('Bu nom allaqachon mavjud!', 'error');
  
  products.push({ id: nextId++, ...d });
  save();
  render();
  clearForm();
  showAlert('Mahsulot muvaffaqiyatli qo\'shildi ✓', 'success');
}

function updateProduct() {
  if (!selectedId) return showAlert('Yangilash uchun mahsulotni tanlang!', 'warning');
  const d = getFormData();
  if (!d.name) return showAlert('Mahsulot nomini kiriting!', 'error');
  
  const idx = products.findIndex(p => p.id === selectedId);
  products[idx] = { id: selectedId, ...d };
  save();
  render();
  showAlert('Mahsulot yangilandi ✓', 'success');
}

function deleteProduct() {
  if (!selectedId) return showAlert('O\'chirish uchun mahsulotni tanlang!', 'warning');
  const p = products.find(x => x.id === selectedId);
  if (!confirm(`"${p.name}" ni o'chirishni tasdiqlaysizmi?`)) return;
  products = products.filter(x => x.id !== selectedId);
  selectedId = null;
  save();
  render();
  clearForm();
  showAlert('Mahsulot o\'chirildi', 'error');
}

function clearForm() {
  document.getElementById('inpName').value = '';
  document.getElementById('inpQty').value = '';
  document.getElementById('inpPrice').value = '';
  document.getElementById('inpMin').value = '';
  selectedId = null;
  render();
}

function selectRow(id) {
  if (selectedId === id) { selectedId = null; clearForm(); return; }
  selectedId = id;
  const p = products.find(x => x.id === id);
  document.getElementById('inpName').value = p.name;
  document.getElementById('inpQty').value = p.qty;
  document.getElementById('inpPrice').value = p.price;
  document.getElementById('inpMin').value = p.min;
  render();
}

function filterProducts() { render(); }

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  render();
}

// ==================== ALERT ====================
let alertTimer;
function showAlert(msg, type) {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = `alert ${type} show`;
  clearTimeout(alertTimer);
  alertTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ==================== DEMO DATA ====================
if (products.length === 0) {
  products = [
    { id: nextId++, name: 'Adrenaline Rush', qty: 5, price: 100000, min: 4 },
    { id: nextId++, name: 'Coca-Cola 0.5L', qty: 2, price: 8000, min: 10 },
    { id: nextId++, name: 'Pepsi 1L', qty: 35, price: 12000, min: 8 },
    { id: nextId++, name: 'Lay\'s Classic', qty: 0, price: 15000, min: 5 },
    { id: nextId++, name: 'Snickers 50g', qty: 18, price: 11000, min: 6 },
  ];
  save();
}

render();
</script>
</body>
</html>
